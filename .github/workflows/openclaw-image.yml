name: Build OpenClaw Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g. latest, sha, custom)"
        required: false
        default: "latest"

# Auto-push trigger is intentionally removed.
# Builds run on Coolify directly from git (local image, no GHCR push needed).
# Trigger this workflow manually only when publishing a GHCR image is explicitly required.

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: img
        run: |
          tag="${{ inputs.image_tag }}"
          if [ -z "$tag" ]; then tag="latest"; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wickeddevsupport/openclaw
          tags: |
            type=raw,value=${{ steps.img.outputs.tag }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.openclaw.nx
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
