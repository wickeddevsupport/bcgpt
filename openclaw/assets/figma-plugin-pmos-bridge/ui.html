<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PMOS Figma Annotation Bridge</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        font: 12px/1.45 Inter, ui-sans-serif, system-ui, sans-serif;
        background: #111827;
        color: #f9fafb;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.04);
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      input, select, textarea, button {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
      }
      input, select, textarea {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(17, 24, 39, 0.72);
        color: inherit;
      }
      button {
        border: 0;
        border-radius: 9px;
        padding: 9px 10px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: #22c55e;
        color: #052e16;
      }
      .secondary {
        background: #1f2937;
        color: #f9fafb;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .muted {
        color: #cbd5e1;
      }
      .status {
        white-space: pre-wrap;
        min-height: 48px;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div class="card">
        <div style="font-size:14px; font-weight:700;">PMOS Figma Annotation Bridge</div>
        <div class="muted" style="margin-top:4px;">
          Sync true Figma annotations into the PMOS Figma MCP-compatible bridge.
        </div>
      </div>

      <div class="card stack">
        <div id="fileInfo" class="muted">Loading current file context...</div>
        <div>
          <label for="serverUrl">PMOS Server URL</label>
          <input id="serverUrl" placeholder="https://os.wickedlab.io" />
        </div>
        <div>
          <label for="workspaceId">Workspace ID</label>
          <input id="workspaceId" placeholder="Paste from PMOS bridge prepare response" />
        </div>
        <div>
          <label for="bridgeToken">Bridge Token</label>
          <textarea id="bridgeToken" rows="3" placeholder="Paste from PMOS bridge prepare response"></textarea>
        </div>
        <div>
          <label for="syncUrl">Sync URL</label>
          <input id="syncUrl" placeholder="Optional override; defaults to /figma/plugin-bridge/sync" />
        </div>
        <div class="row">
          <button id="saveButton" class="secondary" type="button">Save Settings</button>
          <button id="closeButton" class="secondary" type="button">Close</button>
        </div>
      </div>

      <div class="card stack">
        <div style="font-weight:700;">Sync</div>
        <div class="row">
          <button id="selectionButton" class="primary" type="button">Sync Selection</button>
          <button id="pageButton" class="secondary" type="button">Sync Page</button>
        </div>
        <button id="documentButton" class="secondary" type="button">Sync Document</button>
      </div>

      <div class="card">
        <div style="font-weight:700; margin-bottom:6px;">Status</div>
        <div id="status" class="status muted">Waiting for bridge state...</div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const serverUrl = $("serverUrl");
      const workspaceId = $("workspaceId");
      const bridgeToken = $("bridgeToken");
      const syncUrl = $("syncUrl");
      const fileInfo = $("fileInfo");
      const status = $("status");

      function currentSettings() {
        return {
          serverUrl: serverUrl.value.trim(),
          workspaceId: workspaceId.value.trim(),
          bridgeToken: bridgeToken.value.trim(),
          syncUrl: syncUrl.value.trim(),
        };
      }

      function setStatus(message) {
        status.textContent = message;
      }

      function post(type, extra = {}) {
        parent.postMessage({ pluginMessage: { type, ...extra } }, "*");
      }

      window.onmessage = (event) => {
        const msg = event.data && event.data.pluginMessage;
        if (!msg || typeof msg !== "object") {
          return;
        }
        if (msg.type === "bridge-state") {
          serverUrl.value = msg.settings?.serverUrl || "https://os.wickedlab.io";
          workspaceId.value = msg.settings?.workspaceId || "";
          bridgeToken.value = msg.settings?.bridgeToken || "";
          syncUrl.value = msg.settings?.syncUrl || "";
          fileInfo.innerHTML =
            `<strong>File:</strong> ${msg.file?.fileName || "(unknown)"}<br>` +
            `<strong>File key:</strong> <code>${msg.file?.fileKey || "(unsaved)"}</code><br>` +
            `<strong>Current page:</strong> ${msg.file?.currentPage || "(unknown)"}<br>` +
            `<strong>Selection count:</strong> ${msg.file?.selectionCount || 0}`;
          setStatus("Ready. Save settings if needed, then run a sync.");
          return;
        }
        if (msg.type === "save-complete") {
          setStatus("Settings saved locally in Figma client storage.");
          return;
        }
        if (msg.type === "sync-complete") {
          const total =
            msg.result?.snapshot?.annotations?.length ??
            msg.result?.snapshot?.totalAnnotations ??
            msg.result?.snapshot?.annotationsCount ??
            0;
          setStatus(`Sync completed for scope "${msg.scope}". Annotations synced: ${total}.`);
          return;
        }
        if (msg.type === "sync-error") {
          setStatus(`Sync failed: ${msg.error}`);
        }
      };

      $("saveButton").onclick = () => post("save-settings", { settings: currentSettings() });
      $("selectionButton").onclick = () => {
        setStatus("Syncing selected nodes...");
        post("sync-annotations", { settings: currentSettings(), scope: "selection" });
      };
      $("pageButton").onclick = () => {
        setStatus("Syncing current page...");
        post("sync-annotations", { settings: currentSettings(), scope: "current_page" });
      };
      $("documentButton").onclick = () => {
        setStatus("Syncing entire document...");
        post("sync-annotations", { settings: currentSettings(), scope: "document" });
      };
      $("closeButton").onclick = () => post("close-plugin");

      post("load-bridge-state");
    </script>
  </body>
</html>
