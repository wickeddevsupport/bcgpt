version: "3.9"

services:
  pmos:
    build:
      context: .
      dockerfile: Dockerfile.openclaw.nx
      args:
        OPENCLAW_NX_PROJECTS: "openclaw-app,openclaw-control-ui"
    environment:
      # Keep OpenClaw config/workspace in a named volume by pinning HOME into /app.
      HOME: /app
      TERM: xterm-256color

      # Required when binding to LAN (0.0.0.0) behind Traefik.
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN}"

      # Shared Ollama defaults for PMOS workspaces (Coolify-hosted endpoint).
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-ollama-local}"
      OPENCLAW_OLLAMA_API_BASE_URL: "${OPENCLAW_OLLAMA_API_BASE_URL:-https://bot.wickedlab.io}"
      OPENCLAW_OLLAMA_BASE_URL: "${OPENCLAW_OLLAMA_BASE_URL:-https://bot.wickedlab.io/v1}"
      PMOS_DEFAULT_OLLAMA_MODEL: "${PMOS_DEFAULT_OLLAMA_MODEL:-qwen3:1.7b}"

      # Embedded-first behavior. Only allow remote ops provisioning if explicitly enabled.
      PMOS_ALLOW_REMOTE_OPS_FALLBACK: "${PMOS_ALLOW_REMOTE_OPS_FALLBACK:-0}"
      PMOS_LIBRECHAT_URL: "${PMOS_LIBRECHAT_URL:-}"

      # Shared Kilo API key — covers free-tier models for all workspaces (no per-user key needed).
      KILO_API_KEY: "${KILO_API_KEY:-}"
      # Optional model auth (add in Coolify env vars if/when needed).
      CLAUDE_AI_SESSION_KEY: "${CLAUDE_AI_SESSION_KEY:-}"
      CLAUDE_WEB_SESSION_KEY: "${CLAUDE_WEB_SESSION_KEY:-}"
      CLAUDE_WEB_COOKIE: "${CLAUDE_WEB_COOKIE:-}"
    volumes:
      - openclaw-data:/app/.openclaw
    expose:
      - "10001"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "openclaw.mjs",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "lan",
        "--port",
        "10001"
      ]

volumes:
  openclaw-data:
    driver: local

